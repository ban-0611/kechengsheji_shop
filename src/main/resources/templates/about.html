<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .about-container {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 2px 16px rgba(0,0,0,0.04);
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        .about-container .logo {
            font-size: 3.5rem;
            color: #f59e0b;
            margin-bottom: 1rem;
        }
        .about-container h1 {
            font-size: 1.6rem;
            color: #1e293b;
            margin-bottom: 0.3rem;
        }
        .about-container .version {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .about-container .desc {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .about-container .tech {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .about-container .tech span {
            background: #f1f5f9;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #475569;
        }
        .about-container .footer {
            color: #94a3b8;
            font-size: 0.8rem;
            border-top: 1px solid #f1f5f9;
            padding-top: 1rem;
        }
        .btn-back {
            display: inline-flex; align-items: center; gap: 0.4rem;
            margin-top: 1rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
            cursor: pointer;
            background: none;
            border: none;
        }
        .btn-back:hover { color: #f59e0b; }
        @media (max-width: 480px) {
            .about-container { padding: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="about-container">
    <div class="logo"><i class="fas fa-lightbulb"></i></div>
    <h1>智慧商品信息管理系统</h1>
    <p class="version">版本 v2.0.0</p>
    <p class="desc">
        一套完整的商品信息管理解决方案，涵盖商品分类、产品管理、数据发布、
        权限控制与缓存优化等功能模块。
    </p>
    <div class="tech">
        <span>Spring Boot</span>
        <span>Thymeleaf</span>
        <span>MyBatis</span>
        <span>PageHelper</span>
        <span>Spring Security</span>
        <span>Redis</span>
    </div>
    <div class="footer">
        © 2026 智慧商品信息管理系统 · 用技术创造价值
    </div>
    <button class="btn-back" onclick="backToHome()">
        <i class="fas fa-arrow-left"></i> 返回首页
    </button>
</div>

<script>
    function backToHome() {
        // 通知父页面切换到欢迎页
        if (window.parent !== window) {
            window.parent.postMessage({
                type: 'navigate',
                url: '/welcome',
                title: '首页',
                subTitle: '欢迎回来'
            }, '*');
        } else {
            window.location.href = '/welcome';
        }
    }

    // 通知父页面更新标题
    if (window.parent !== window) {
        window.parent.postMessage({
            type: 'pageTitle',
            title: '关于系统',
            subTitle: '系统信息'
        }, '*');
    }
</script>
</body>
</html>
