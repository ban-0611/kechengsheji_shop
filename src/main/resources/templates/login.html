<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智慧商品管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f2f5 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 2.5rem 2.8rem;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header .logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 18px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 2rem; color: white; margin-bottom: 1rem;
            box-shadow: 0 4px 16px rgba(245,158,11,0.3);
        }
        .login-header h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
        .login-header p { color: #94a3b8; font-size: 0.9rem; margin-top: 0.2rem; }

        .message {
            padding: 0.7rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
            display: none;
        }
        .message.error { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .message.success { display: block; background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .message i { margin-right: 0.4rem; }

        .demo-hint {
            background: #f8fafc;
            border-radius: 10px;
            padding: 0.6rem 1rem;
            margin-bottom: 1.2rem;
            font-size: 0.8rem;
            color: #64748b;
            border: 1px dashed #e2e8f0;
        }
        .demo-hint code { background: #e2e8f0; padding: 0.1rem 0.4rem; border-radius: 4px; color: #1e293b; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #1e293b; margin-bottom: 0.4rem; }
        .form-group .input-group { position: relative; }
        .form-group .input-group i {
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            color: #94a3b8;
        }
        .form-group .input-group input {
            width: 100%; padding: 0.7rem 1rem 0.7rem 2.6rem;
            border: 1.5px solid #e2e8f0; border-radius: 12px;
            font-size: 0.95rem; transition: all 0.2s;
            background: #fafbfc;
        }
        .form-group .input-group input:focus {
            outline: none; border-color: #f59e0b;
            box-shadow: 0 0 0 4px rgba(245,158,11,0.08);
            background: white;
        }

        .btn-login {
            width: 100%; padding: 0.7rem;
            background: #1e293b; color: white;
            border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            margin-top: 0.3rem;
        }
        .btn-login:hover { background: #0f172a; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(30,41,59,0.2); }
        .btn-login i { margin-right: 0.5rem; }

        .login-footer {
            text-align: center; margin-top: 1.5rem; padding-top: 1.5rem;
            border-top: 1px solid #f1f5f9;
        }
        .login-footer a { color: #64748b; text-decoration: none; font-size: 0.85rem; transition: 0.2s; }
        .login-footer a:hover { color: #f59e0b; }
        .login-footer .register-link { color: #f59e0b; font-weight: 500; }
        .login-footer .register-link:hover { color: #d97706; }

        @media (max-width: 480px) {
            .login-container { padding: 1.8rem 1.5rem; }
            .login-header h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <div class="logo"><i class="fas fa-lightbulb"></i></div>
        <h1>智慧商品管理系统</h1>
        <p>登录以继续使用</p>
    </div>

    <div class="message error" th:if="${param.error}">
        <i class="fas fa-exclamation-circle"></i> 用户名或密码错误，请重新输入
    </div>
    <div class="message success" th:if="${param.logout}">
        <i class="fas fa-check-circle"></i> 已成功退出
    </div>
    <div class="message success" th:if="${param.registered}">
        <i class="fas fa-check-circle"></i> 注册成功，请登录
    </div>

    <div class="demo-hint">
        <i class="fas fa-info-circle"></i> 演示账号：<code>admin</code> / <code>123456</code>
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label><i class="fas fa-user"></i> 用户名</label>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="请输入用户名" required autofocus>
            </div>
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> 密码</label>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
        </div>
        <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> 登录</button>
    </form>

    <div class="login-footer">
        <span style="color:#94a3b8;font-size:0.85rem;">还没有账号？</span>
        <a href="/register" class="register-link">立即注册</a>
    </div>
</div>
</body>
</html>
