<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑分类</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .form-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid #e2e8f0;
        }
        .form-card h2 { font-size: 1.3rem; color: #1e293b; margin-bottom: 0.5rem; }
        .form-card .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: #1e293b; margin-bottom: 0.3rem; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 0.5rem 0.8rem;
            border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 0.95rem; transition: 0.2s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none; border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245,158,11,0.08);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; }
        .btn-submit {
            background: #f59e0b; color: white; border: none;
            padding: 0.5rem 1.5rem; border-radius: 8px;
            font-size: 0.9rem; cursor: pointer; transition: 0.2s;
        }
        .btn-submit:hover { background: #d97706; }
        .btn-cancel {
            background: #f1f5f9; color: #64748b; border: none;
            padding: 0.5rem 1.5rem; border-radius: 8px;
            font-size: 0.9rem; cursor: pointer; transition: 0.2s;
            text-decoration: none; display: inline-flex; align-items: center;
        }
        .btn-cancel:hover { background: #e2e8f0; }
        @media (max-width: 480px) {
            body { padding: 1rem; }
            .form-card { padding: 1.2rem; }
            .form-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="form-card">
    <h2><i class="fas fa-edit" style="color:#f59e0b;margin-right:0.5rem;"></i>编辑分类</h2>
    <p class="subtitle">修改分类信息</p>

    <form th:action="@{/category/edit}" method="post">
        <input type="hidden" name="id" th:value="${category.id}">
        <div class="form-group">
            <label>分类名称</label>
            <input type="text" name="name" th:value="${category.name}" placeholder="请输入分类名称" required>
        </div>
        <div class="form-group">
            <label>分类描述</label>
            <textarea name="descp" placeholder="请输入分类描述（选填）" th:text="${category.descp}"></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-submit"><i class="fas fa-save"></i> 更新</button>
            <a href="/category/list" class="btn-cancel">取消</a>
        </div>
    </form>
</div>
</body>
</html>
