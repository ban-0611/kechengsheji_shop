<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f2f5 0%, #e2e8f0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .welcome-container {
            text-align: center;
            padding: 2rem;
        }
        .welcome-container .icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
        }
        .welcome-container h1 {
            font-size: 2.5rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        .welcome-container p {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 0.3rem;
        }
        .welcome-container .highlight {
            color: #f59e0b;
            font-weight: 600;
        }
        .welcome-container .features {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .welcome-container .feature-item {
            background: white;
            padding: 1.2rem 1.8rem;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid #e2e8f0;
            min-width: 140px;
        }
        .welcome-container .feature-item i {
            font-size: 1.8rem;
            color: #f59e0b;
            display: block;
            margin-bottom: 0.3rem;
        }
        .welcome-container .feature-item span {
            font-size: 0.85rem;
            color: #64748b;
        }
        @media (max-width: 600px) {
            .welcome-container h1 { font-size: 1.8rem; }
            .welcome-container .features { gap: 0.8rem; }
            .welcome-container .feature-item { padding: 0.8rem 1.2rem; min-width: 100px; }
        }
    </style>
</head>
<body>
<div class="welcome-container">
    <div class="icon">🎉</div>
    <h1>欢迎来到 <span class="highlight">智慧商品管理系统</span></h1>
    <p>请从左侧菜单选择功能开始使用</p>
    <p style="font-size:0.85rem;color:#94a3b8;margin-top:0.3rem;">💡 提示：部分功能需要登录后才能访问</p>

    <div class="features">
        <div class="feature-item">
            <i class="fas fa-tags"></i>
            <span>分类管理</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-box"></i>
            <span>产品管理</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-rocket"></i>
            <span>数据发布</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-user-shield"></i>
            <span>权限控制</span>
        </div>
    </div>

    <p style="margin-top:2rem;font-size:0.8rem;color:#94a3b8;">
        © 2026 智慧商品信息管理系统 v2.0
    </p>
</div>

<script>
    // 通知父页面更新标题
    if (window.parent !== window) {
        window.parent.postMessage({
            type: 'pageTitle',
            title: '首页',
            subTitle: '欢迎回来'
        }, '*');
    }
</script>
</body>
</html>
