<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 智慧商品管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f2f5 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .register-container {
            background: white;
            border-radius: 24px;
            padding: 2.5rem 2.8rem;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }
        .register-header { text-align: center; margin-bottom: 2rem; }
        .register-header .logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 18px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 2rem; color: white; margin-bottom: 1rem;
            box-shadow: 0 4px 16px rgba(16,185,129,0.3);
        }
        .register-header h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
        .register-header p { color: #94a3b8; font-size: 0.9rem; margin-top: 0.2rem; }

        .message {
            padding: 0.7rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
            display: none;
        }
        .message.error { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #1e293b; margin-bottom: 0.4rem; }
        .form-group .input-group { position: relative; }
        .form-group .input-group i {
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            color: #94a3b8;
        }
        .form-group .input-group input {
            width: 100%; padding: 0.7rem 1rem 0.7rem 2.6rem;
            border: 1.5px solid #e2e8f0; border-radius: 12px;
            font-size: 0.95rem; transition: all 0.2s;
            background: #fafbfc;
        }
        .form-group .input-group input:focus {
            outline: none; border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16,185,129,0.08);
            background: white;
        }

        .btn-register {
            width: 100%; padding: 0.7rem;
            background: #10b981; color: white;
            border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            margin-top: 0.3rem;
        }
        .btn-register:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,185,129,0.2); }
        .btn-register i { margin-right: 0.5rem; }

        .register-footer {
            text-align: center; margin-top: 1.5rem; padding-top: 1.5rem;
            border-top: 1px solid #f1f5f9;
        }
        .register-footer a { color: #10b981; text-decoration: none; font-size: 0.85rem; font-weight: 500; }
        .register-footer a:hover { color: #059669; }
        .register-footer span { color: #94a3b8; font-size: 0.85rem; }

        @media (max-width: 480px) {
            .register-container { padding: 1.8rem 1.5rem; }
            .register-header h1 { font-size: 1.2rem; }
        }
        </style>
          </head>
            <body>
            <div class="register-container">
                                           <div class="register-header">
                                                                       <div class="logo"><i class="fas fa-user-plus"></i></div>
                                                                                                                           <h1>创建新账号</h1>
                                                                                                                                      <p>注册成为智慧商品管理系统用户</p>
                                                                                                                                                         </div>

                                                                                                                                                           <div class="message error" th:if="${error}">
                                                                                                                                                                                                      <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">注册失败</span>
                                                                                                                                                                                                                                                                               </div>

                                                                                                                                                                                                                                                                                 <form th:action="@{/register}" method="post">
                                                                                                                                                                                                                                                                                                                             <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                    <label><i class="fas fa-user"></i> 用户名</label>
                                                                                                                                                                                                                                                                                                                                                                                            <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                    <i class="fas fa-user"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                             <input type="text" name="username" placeholder="请设置用户名" required autofocus>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <label><i class="fas fa-lock"></i> 密码</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               <i class="fas fa-lock"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="password" name="password" placeholder="请设置密码（至少6位）" required minlength="6">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   <button type="submit" class="btn-register"><i class="fas fa-user-plus"></i> 立即注册</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     </form>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       <div class="register-footer">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   <span>已有账号？</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <a href="/login">去登录</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if (window.parent !== window) {
        window.parent.postMessage({
            type: 'pageTitle',
            title: '用户注册',
            subTitle: '创建新账号'
        }, '*');
        }
        </script>
          </body>
            </html>
